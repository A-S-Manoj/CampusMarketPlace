<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CampusMarketplace - Chat</title>

    <link rel="stylesheet" href="css/chat.css">

</head>

<body>

    <header>
        <div class="logo">&emsp;
            <a href="/"><img src="assets/images/logo.png" width="75" height="75"></a>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="addProduct.html">Sell/Lend</a>
            <a href="chat.html">Chat</a>

            <a href="profile.html">Profile</a>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </nav>
    </header>

    <main class="chat-container">

        <div class="chat-layout">


            <div class="chat-sidebar">

                <div class="chat-sb-header">
                    <h2>Messages</h2>
                </div>

                <div class="chat-sb-list" id="conversationList">


                    <div class="chat-sb-item active">
                        <div class="chat-sb-avatar">U</div>
                        <div class="chat-sb-info">
                            <span class="chat-sb-name">User 1</span>
                        </div>
                    </div>

                    <div class="chat-sb-item">
                        <div class="chat-sb-avatar">U</div>
                        <div class="chat-sb-info">
                            <span class="chat-sb-name">User 2</span>
                        </div>
                    </div>

                </div>

            </div>



            <div class="chat-main">

                <div class="chat-main-header">

                    <div class="chat-mh-user">

                        <div class="chat-sb-avatar small">U</div>

                        <h3 id="chatUserName">User 1</h3>

                    </div>

                </div>



                <div class="chat-messages" id="chatMessages">

                    <div class="chat-bubble-wrap them">
                        <div class="chat-bubble">
                            <p>Hello</p>
                            <span class="chat-time">10:30</span>
                        </div>
                    </div>

                    <div class="chat-bubble-wrap me">
                        <div class="chat-bubble">
                            <p>Hi there!</p>
                            <span class="chat-time">10:31</span>
                        </div>
                    </div>

                </div>



                <form class="chat-input-area" id="chatForm">

                    <input type="text" id="chatInput" placeholder="Type a message..." class="chat-input">

                    <button type="submit" class="chat-send-btn">
                        ➤
                    </button>

                </form>

            </div>

        </div>

    </main>

    <footer>

        <a href="#">About</a>
        <a href="#">Contact Us</a>
        <a href="#">Support</a>

        <br><br>

        © 2026 CampusMarketPlace. All Rights Reserved.

    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/chat.js"></script>

</body>

</html>
