<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CampusMarketplace - Chat</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>

<body>

    <header>
        <div class="logo"><a href="/"><img src="/assets/images/logo.png" alt="CampusMarketPlace"></a></div>

        <nav class="nav-links">
            <a href="/dashboard">Home</a>
            <a href="/add-product">Sell/Lend</a>
            <a href="/chat">Chat</a>

            <a href="/profile">Profile</a>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <!-- Icon will be injected by theme.js -->
            </button>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </nav>
    </header>

    <main class="chat-container">
        <div class="breadcrumb">
            <a href="/dashboard">Dashboard</a> / <span>Messages</span>
        </div>

        <div class="chat-layout">


            <div class="chat-sidebar">

                <div class="chat-sb-header">
                    <h2>Messages</h2>
                    <button id="chatSearchBtn" class="chat-search-btn" title="Search users">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
                
                <div id="chatSearchContainer" class="chat-search-container">
                    <input type="text" id="chatSearchInput" class="chat-search-input" placeholder="Search users...">
                </div>

                <div class="chat-sb-list" id="conversationList">
                </div>

            </div>



            <div class="chat-main">

                <div class="chat-main-header" id="chatMainHeader" style="display: none;">
                    <div class="chat-mh-user" style="display:flex; align-items:center; gap: 12px;">
                        <div class="chat-sb-avatar small"></div>
                        <div style="display:flex; flex-direction:column;">
                            <h3 id="chatUserName" style="margin:0; line-height: 1.2;"></h3>
                            <div id="chatUserStatus" style="display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-muted); opacity: 0; transition: opacity 0.3s;">
                                <span class="online-indicator online" style="margin:0; width:8px; height:8px;"></span>
                                <span>Online</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty-state" id="chatEmptyState">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <h3>No conversation selected</h3>
                        <p>Choose a conversation from the sidebar or contact a seller to start chatting.</p>
                    </div>
                </div>

                <form class="chat-input-area" id="chatForm" style="display: none;">
                    <button type="button" class="trade-deal-btn" id="tradeDealBtn" style="display: none;" title="Send Buy/Rent Request">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span id="tradeDealBtnText">Request to Buy</span>
                    </button>
                    <input type="text" id="chatInput" placeholder="Type a message..." class="chat-input">
                    <button type="submit" class="chat-send-btn">➤</button>
                </form>

            </div>

        </div>

    </main>

    <footer>
        <a href="/support#about">About</a>
        <a href="/support#contact">Contact Us</a>
        <a href="/support#support">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <script src="/js/utils/theme.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/utils/notifications.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/utils/socketClient.js"></script>
    <script src="/js/chat.js"></script>

</body>

</html>
