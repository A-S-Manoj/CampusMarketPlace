<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarketPlace - Dashboard</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>

<body>

    <header class="navbar">
        <div class="logo"><a href="/"><img src="/assets/images/logo.png" alt="CampusMarketPlace"></a></div>

        <nav class="nav-links">
            <a href="/dashboard">Home</a>
            <a href="/add-product">Sell/Lend</a>
            <a href="/chat">Chat</a>

            <a href="/profile">Profile</a>
            <div class="notification-container">
                <button id="notificationBtn" class="notification-btn" onclick="toggleNotifications(event)" title="Notifications">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span id="notificationBadge" class="notification-badge hidden">0</span>
                </button>
                <div id="notificationDropdown" class="notification-dropdown">
                    <div class="notification-header">
                        <h3>Notifications</h3>
                        <button id="markAllRead" class="mark-all-read">Mark all as read</button>
                    </div>
                    <div id="notificationList" class="notification-list">
                        <div class="empty-notifications">No notifications yet</div>
                    </div>
                </div>
            </div>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <!-- Icon will be injected by theme.js -->
            </button>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">This is your Campus Marketplace</h1>
                <p class="hero-subtitle">Discover the best deals and essentials shared by your fellow students.</p>

                <div class="glass-container">
                    <div class="search-section">
                        <div class="search-wrapper">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round"></path>
                            </svg>
                            <input type="text" id="searchInput"
                                placeholder="Search for products, books, electronics...">
                        </div>
                        <button class="filter-btn" onclick="openFilter()">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="4" y1="21" x2="4" y2="14"></line>
                                <line x1="4" y1="10" x2="4" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12" y2="3"></line>
                                <line x1="20" y1="21" x2="20" y2="16"></line>
                                <line x1="20" y1="12" x2="20" y2="3"></line>
                                <line x1="1" y1="14" x2="7" y2="14"></line>
                                <line x1="9" y1="8" x2="15" y2="8"></line>
                                <line x1="17" y1="16" x2="23" y2="16"></line>
                            </svg>
                            <span>Filter</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Filter Overlay & Box -->
        <div id="filterOverlay" class="filter-overlay hide" onclick="closeFilter()"></div>
        <div id="filterBox" class="filter-box hide">
            <div class="filter-header">
                <h3>Advanced Filters</h3>
                <span class="close-filter" onclick="closeFilter()">&times;</span>
            </div>

            <div class="filter-body">
                <div class="filter-group">
                    <label>Product Type</label>
                    <div class="type-toggle">
                        <label><input type="radio" name="fType" value="" checked> All</label>
                        <label><input type="radio" name="fType" value="sell"> Sell</label>
                        <label><input type="radio" name="fType" value="lend"> Lend</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Category</label>
                    <select id="fCategory" class="filter-select">
                        <option value="">All Categories</option>
                        <option>Electronics</option>
                        <option>Books & Study Material</option>
                        <option>Furniture & Decor</option>
                        <option>Clothing & Fashion</option>
                        <option>Vehicles (Bicycles/Scooters)</option>
                        <option>Home & Kitchen</option>
                        <option>Sports & Fitness</option>
                        <option>Services (Tuition/Projects)</option>
                        <option>Others</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Price Range (₹)</label>
                    <div class="price-inputs">
                        <input type="number" id="fMinPrice" placeholder="Min">
                        <span>to</span>
                        <input type="number" id="fMaxPrice" placeholder="Max">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Posted Within</label>
                    <div class="time-options">
                        <label><input type="radio" name="fTime" value="" checked> Any time</label>
                        <label><input type="radio" name="fTime" value="today"> Today</label>
                        <label><input type="radio" name="fTime" value="weekly"> This Week</label>
                    </div>
                </div>
            </div>

            <div class="filter-footer">
                <button class="btn btn-clear" onclick="clearFilters()">Clear All</button>
                <button class="btn btn-apply" onclick="applyFilters()">Apply Filters</button>
            </div>
        </div>

        <section>
            <h2>Explore</h2>
            <div id="productContainer" class="product-grid">

            </div>

            <div class="pagination" id="paginationControls">
            </div>

        </section>


    </main>

    <footer>
        <a href="/support#about">About</a>
        <a href="/support#contact">Contact Us</a>
        <a href="/support#support">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>
    <script src="/js/utils/theme.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/utils/notifications.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/utils/socketClient.js"></script>
    <script src="/js/dashboard.js"></script>

</body>

</html>
