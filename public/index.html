<!DOCTYPE html>
<html lang="en">

<head>
    <title>CampusMarketPlace - Sharing is Caring</title>
    <script src="js/components/splashCursor.js" defer></script>
    <style>
        header {
            background: black;
            width: 100%;
            height: 50px;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body {
            background-color: #181818;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .nav-links {
            display: flex;
            color: white;
            text-decoration: none;
            margin-left: 15px;
            margin-right: 10px;
            padding: 8px 10px;
            border-radius: 5px;
            transition: 0.3s;
            gap: 15px;
        }

        footer {
            width: 100%;
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .sec1 {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .sec1 h1 {
            font-size: 42px;
            margin-bottom: 20px;
            -webkit-text-fill-color: transparent;
            background: linear-gradient(90deg, #03a9f4, #f441a5);
            background-clip: text;
        }

        .sec1 p {
            font-size: 18px;
            max-width: 600px;
            margin: auto;
        }

        a {
            color: white;
            text-decoration: underline;
        }

        button {
            font-size: 1.4em;
            padding: 0.4em 0.8em;
            border-radius: 0.6em;
            border: none;
            background-color: transparent;
            color: #fff;
            cursor: pointer;
            box-shadow: 2px 2px 3px #000000b4;
        }

        .container {
            position: relative;
            border: 3px solid transparent;
            background: linear-gradient(#000, #000) padding-box,
                linear-gradient(90deg, #03a9f4, #f441a5) border-box;
            border-radius: 0.9em;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0;
            margin: auto;
            border-radius: 0.9em;
            z-index: -1;
            background: linear-gradient(90deg, #03a9f4, #f441a5);
            opacity: 0;
            filter: blur(0);
            transition: opacity 0.4s ease, filter 0.4s ease;
        }

        .container:hover::before {
            opacity: 1;
            filter: blur(1.2em);
        }

        .container:active::before {
            opacity: 1;
            filter: blur(0.2em);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">&emsp;<img src="assets/images/logo.png" alt="CampusMarketPlace" width="75px" height="75px">
        </div>
        <div class="nav-links">
            <div class="container">
                <button class="button" onclick="window.location.href = '/login.html';">Login</button>
            </div>
            <div class="container">
                <button class="button" onclick="window.location.href ='/register.html';">Register</button>
            </div>
        </div>
    </header>

    <section class="sec1">
        <div>
            <h1>Welcome to CampusMarketPlace</h1>
            <p>Find useful things from people you know.</p>
        </div>
    </section>

    <footer>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>
</body>

</html>
