        <div class="signin">

            <div class="content">

                <h2>Create Account</h2>

                <div class="form">

                    <form id="registerForm">

                        <div class="inputBox">
                            <input type="text" id="name" required>
                            <i>Full Name</i>
                        </div>

                        <div class="inputBox">
                            <input type="email" id="email" required>
                            <i>Email</i>
                        </div>

                        <div class="inputBox">
                            <input type="text" id="username" required>
                            <i>Username</i>
                        </div>

                        <div class="inputBox">
                            <input type="password" id="password" required>
                            <i>Password</i>
                            <div class="validation-box" id="passwordValidation">
                                <div class="requirement" id="req-length"><i>✖</i> At least 8 characters</div>
                                <div class="requirement" id="req-lower"><i>✖</i> One lowercase letter</div>
                                <div class="requirement" id="req-upper"><i>✖</i> One uppercase letter</div>
                                <div class="requirement" id="req-digit"><i>✖</i> One number</div>
                                <div class="requirement" id="req-special"><i>✖</i> One special character</div>
                            </div>
                        </div>

                        <div class="inputBox">
                            <input type="password" id="confirmPassword" required>
                            <i>Confirm Password</i>
                        </div>

                        <div class="links">
                            <a href="login.html">Already have an account?</a>
                        </div>

                        <div class="inputBox">
                            <input type="submit" value="Register">
                        </div>

                    </form>
