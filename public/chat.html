<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CampusMarketplace - Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>

<body>

    <header>
        <div class="logo">&emsp;
            <a href="/"><img src="assets/images/logo.png" width="75" height="75"></a>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="addProduct.html">Sell/Lend</a>
            <a href="chat.html">Chat</a>

            <a href="profile.html">Profile</a>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <!-- Icon will be injected by theme.js -->
            </button>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </nav>
    </header>

    <main class="chat-container">
        <div class="breadcrumb">
            <a href="dashboard.html">Dashboard</a> / <span>Messages</span>
        </div>

        <div class="chat-layout">


            <div class="chat-sidebar">

                <div class="chat-sb-header">
                    <h2>Messages</h2>
                </div>

                <div class="chat-sb-list" id="conversationList">
                </div>

            </div>



            <div class="chat-main">

                <div class="chat-main-header" id="chatMainHeader" style="display: none;">
                    <div class="chat-mh-user">
                        <div class="chat-sb-avatar small"></div>
                        <h3 id="chatUserName"></h3>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty-state" id="chatEmptyState">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <h3>No conversation selected</h3>
                        <p>Choose a conversation from the sidebar or contact a seller to start chatting.</p>
                    </div>
                </div>

                <form class="chat-input-area" id="chatForm" style="display: none;">
                    <input type="text" id="chatInput" placeholder="Type a message..." class="chat-input">
                    <button type="submit" class="chat-send-btn">➤</button>
                </form>

            </div>

        </div>

    </main>

    <footer>
        <a href="support.html#about">About</a>
        <a href="support.html#contact">Contact Us</a>
        <a href="support.html#support">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <script src="js/utils/theme.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/utils/socketClient.js"></script>
    <script src="js/chat.js"></script>

</body>

</html>
