<!DOCTYPE html>
<html>

<head>
    <title>CampusMarketPlace - Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">&emsp;<a href="/"><img src="assets/images/logo.png" alt="CampusMarketPlace" width="75px"
                    height="75px"></a>
        </div>

        <nav class="nav-links">
            <a href="#">Home</a>

            <div class="dropdown">
                <span>Categories</span>
                <div class="dropdown-content">
                    <a href="#">Electronics</a>
                    <a href="#">Books</a>
                    <a href="#">Furniture</a>
                </div>
            </div>

            <a href="#">Sell/Rent</a>
            <a href="#">Chat</a>

            <div class="dropdown">
                <span>Profile</span>
                <div class="dropdown-content">
                    <a href="#">View Orders</a>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Search CampusMarketPlace">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                <option value="Books">Books</option>
            </select>
        </section>

        <section>
            <h2>Available Products</h2>
            <div id="productContainer" class="product-grid"></div>
        </section>

    </main>

    <footer>
        <a href="#">About</a>
        <a href="#">Contact Us</a>
        <a href="#">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <script src="js/utils/auth.js"></script>
    <script> requireAuth(); </script>
    <script src="js/dashboard.js"></script>

</body>

</html>
