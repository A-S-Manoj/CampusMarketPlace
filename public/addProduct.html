<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarketPlace - Add Product</title>
    <link rel="stylesheet" href="css/addProduct.css">
</head>

<body>
    <header>
        <div class="logo">&emsp;<a href="/"><img src="assets/images/logo.png" alt="CampusMarketPlace" width="75px"
                    height="75px"></a>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="addProduct.html">Sell/Lend</a>
            <a href="chat.html">Chat</a>
            <a href="profile.html">Profile</a>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </nav>
    </header>

    <main class="container">

        <div class="toggle-container">
            <button id="sellBtn" class="active">Sell</button>
            <button id="lendBtn">Lend</button>
        </div>

        <div class="flip-container">

            <div class="flip-card" id="flipCard">


                <div class="front">

                    <div class="glass-form">
                        <form id="sellForm">

                            <div class="form-layout">

                                <div class="left-section">

                                    <label>Title</label>
                                    <input type="text" id="sellTitle" required>

                                    <label>Price (₹)</label>
                                    <input type="number" id="sellPrice" required>

                                    <label>Category</label>
                                    <select id="sellCategory" required>
                                        <option value="">Select</option>
                                        <option>Electronics</option>
                                        <option>Furniture</option>
                                        <option>Books</option>
                                    </select>

                                </div>

                                <div class="divider"></div>

                                <div class="right-section">

                                    <label>Description</label>
                                    <textarea id="sellDescription" required></textarea>

                                    <label>Upload Image</label>

                                    <div class="image-preview">
                                        <img id="previewSell" src="assets/images/placeholder.png">
                                    </div>

                                    <input type="file" id="imageSell" accept="image/*">

                                </div>

                            </div>

                            <div class="submit-area">
                                <button type="submit">Sell Item</button>
                            </div>

                        </form>
                    </div>

                </div>



                <div class="back">

                    <div class="glass-form">
                        <form id="lendForm">

                            <div class="form-layout">

                                <div class="left-section">

                                    <label>Title</label>
                                    <input type="text" id="lendTitle" required>

                                    <label>Lend Price (₹)</label>
                                    <input type="number" id="lendPrice" required>

                                    <label>Category</label>
                                    <select id="lendCategory" required>
                                        <option value="">Select</option>
                                        <option>Electronics</option>
                                        <option>Furniture</option>
                                        <option>Books</option>
                                    </select>

                                </div>

                                <div class="divider"></div>

                                <div class="right-section">

                                    <label>Description</label>
                                    <textarea id="lendDescription" required></textarea>

                                    <label>Upload Image</label>

                                    <div class="image-preview">
                                        <img id="previewLend" src="assets/images/placeholder.png">
                                    </div>

                                    <input type="file" id="imageLend" accept="image/*">

                                </div>

                            </div>

                            <div class="submit-area">
                                <button type="submit">Lend Item</button>
                            </div>

                        </form>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer>
        <a href="#">About</a>
        <a href="#">Contact Us</a>
        <a href="#">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <script src="js/utils/auth.js"></script>
    <script src="js/addProduct.js"></script>

</body>

</html>
