<!DOCTYPE html>
<html>
<head>
    <title>CampusMarketPlace - Product Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/product.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">&emsp;<a href="/"><img src="assets/images/logo.png" alt="CampusMarketPlace" width="75px" height="75px"></a></div>

        <nav class="nav-links">
            <a href="dashboard.html">Home</a>
            <a href="addProduct.html">Sell/Lend</a>
            <a href="chat.html">Chat</a>
            <a href="profile.html">Profile</a>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <!-- Icon will be injected by theme.js -->
            </button>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </nav>
    </header>

    <main class="product-container">
        <div class="breadcrumb">
            <a href="dashboard.html">Dashboard</a> / <span>Product Details</span>
        </div>
        <div id="loading" class="loading-state">Loading product details...</div>
        <div id="error" class="error-state hide">Product not found.</div>
        
        <div id="productDetail" class="product-detail-wrapper hide">
            <!-- Left: Image -->
            <div class="product-image-section">
                <img id="pdImage" src="" alt="Product Image">
            </div>

            <!-- Right: Info -->
            <div class="product-info-section">
                <div class="pd-category" id="pdCategory"></div>
                <h1 class="pd-title" id="pdTitle"></h1>
                <div class="pd-price" id="pdPrice"></div>
                <div class="pd-type-badge" id="pdType"></div>
                
                <hr class="section-divider">
                
                <h3>Description</h3>
                <p class="pd-description" id="pdDescription"></p>

                <hr class="section-divider">

                <div class="seller-box">
                    <button class="btn btn-contact-large" id="contactBtn">
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <a href="support.html#about">About</a>
        <a href="support.html#contact">Contact Us</a>
        <a href="support.html#support">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <script src="js/utils/theme.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/utils/notifications.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="js/utils/socketClient.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
