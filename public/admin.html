<!DOCTYPE html>
<html>

<head>
    <title>CampusMarketPlace - Admin Panel</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/profile.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>

<body>

    <header class="navbar">
        <div class="logo"><a href="/"><img src="assets/images/logo.png" alt="CampusMarketPlace"></a></div>

        <nav class="nav-links">
            <a href="/dashboard">Home</a>
            <a href="/add-product">Sell/Lend</a>
            <a href="/chat">Chat</a>
            <a href="/profile">Profile</a>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <!-- Icon will be injected by theme.js -->
            </button>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
        </nav>
    </header>

    <main class="profile-container">
        <div class="breadcrumb">
            <a href="/dashboard">Dashboard</a> / <span>Admin Panel</span>
        </div>

        <!-- Overview Section -->
        <section class="admin-section">
            <h2 class="section-title">Overview</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3 id="stat-total-users">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3 id="stat-total-products">0</h3>
                        <p>Active Products</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3 id="stat-pending-support">0</h3>
                        <p>Pending Support</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- User Management Section -->
        <section class="admin-section">
            <div class="section-header">
                <h2 class="section-title">User Management</h2>
                <div class="admin-search-box">
                    <input type="text" id="userSearchInput" placeholder="Find user by username...">
                    <button class="btn btn-search" onclick="searchUsers()">Search</button>
                </div>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Users dynamically loaded here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Support Tickets Section -->
        <section class="admin-section">
            <h2 class="section-title">Support Tickets</h2>
            <div id="ticketsList" class="tickets-container">
                <!-- Tickets dynamically loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <a href="/support#about">About</a>
        <a href="/support#contact">Contact Us</a>
        <a href="/support#support">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="toast hide"></div>

    <script src="/js/utils/theme.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/utils/notifications.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
