<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarketPlace - Add Product</title>
    <link rel="stylesheet" href="css/addProduct.css">
</head>

<body>
    <header>
        <div class="logo">&emsp;<a href="/"><img src="assets/images/logo.png" alt="CampusMarketPlace" width="75px"
                    height="75px"></a>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html">Home</a>

            <div class="dropdown">
                <span>Categories</span>
                <div class="dropdown-content">
                    <a href="#">Electronics</a>
                    <a href="#">Furniture</a>
                    <a href="#">Books</a>
                    <a href="#">Vehicles</a>
                    <a href="#">Services</a>
                </div>
            </div>

            <a href="#">Sell/Rent</a>
            <a href="#">Chat</a>

            <div class="dropdown">
                <span>Profile</span>
                <div class="dropdown-content">
                    <a href="#">My Profile</a>
                    <a href="#">My Products</a>
                    <a href="#">Settings</a>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">

        <div class="toggle-container">
            <button id="sellBtn" class="active">Sell</button>
            <button id="rentBtn">Rent</button>
        </div>

        <div class="flip-container">

            <div class="flip-card" id="flipCard">


                <div class="front">

                    <div class="glass-form">
                        <form id="sellForm">

                            <div class="form-layout">

                                <div class="left-section">

                                    <label>Title</label>
                                    <input type="text" required>

                                    <label>Price (₹)</label>
                                    <input type="number" required>

                                    <label>Category</label>
                                    <select required>
                                        <option value="">Select</option>
                                        <option>Electronics</option>
                                        <option>Furniture</option>
                                        <option>Books</option>
                                    </select>

                                </div>

                                <div class="divider"></div>

                                <div class="right-section">

                                    <label>Description</label>
                                    <textarea required></textarea>

                                    <label>Upload Image</label>

                                    <div class="image-preview">
                                        <img id="previewSell" src="assets/images/placeholder.png">
                                    </div>

                                    <input type="file" id="imageSell" accept="image/*">

                                </div>

                            </div>

                            <div class="submit-area">
                                <button type="submit">Sell Item</button>
                            </div>

                        </form>
                    </div>

                </div>



                <div class="back">

                    <div class="glass-form">
                        <form id="rentForm">

                            <div class="form-layout">

                                <div class="left-section">

                                    <label>Title</label>
                                    <input type="text" required>

                                    <label>Rent Price (₹)</label>
                                    <input type="number" required>

                                    <label>Category</label>
                                    <select required>
                                        <option value="">Select</option>
                                        <option>Electronics</option>
                                        <option>Furniture</option>
                                        <option>Books</option>
                                    </select>

                                </div>

                                <div class="divider"></div>

                                <div class="right-section">

                                    <label>Description</label>
                                    <textarea required></textarea>

                                    <label>Upload Image</label>

                                    <div class="image-preview">
                                        <img id="previewRent" src="assets/images/placeholder.png">
                                    </div>

                                    <input type="file" id="imageRent" accept="image/*">

                                </div>

                            </div>

                            <div class="submit-area">
                                <button type="submit">Rent Item</button>
                            </div>

                        </form>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer>
        <a href="#">About</a>
        <a href="#">Contact Us</a>
        <a href="#">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>

    <script src="js/utils/auth.js"></script>
    <script src="js/addProduct.js"></script>

</body>

</html>
