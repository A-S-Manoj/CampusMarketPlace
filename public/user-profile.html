<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusMarketPlace - User Profile</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/user-profile.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>

<body>

    <header class="navbar">
        <div class="logo"><a href="/"><img src="/assets/images/logo.png" alt="CampusMarketPlace"></a></div>

        <nav class="nav-links">
            <a href="/dashboard">Home</a>
            <a href="/add-product">Sell/Lend</a>
            <a href="/chat">Chat</a>
            <a href="/profile">Profile</a>
            <div class="notification-container">
                <button id="notificationBtn" class="notification-btn" onclick="toggleNotifications(event)" title="Notifications">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span id="notificationBadge" class="notification-badge hidden">0</span>
                </button>
                <div id="notificationDropdown" class="notification-dropdown">
                    <div class="notification-header">
                        <h3>Notifications</h3>
                        <button id="markAllRead" class="mark-all-read">Mark all as read</button>
                    </div>
                    <div id="notificationList" class="notification-list">
                        <div class="empty-notifications">No notifications yet</div>
                    </div>
                </div>
            </div>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Theme">
                <!-- Icon will be injected by theme.js -->
            </button>
            <button class="logout-btn" onclick="logout()" title="Logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </nav>
    </header>

    <main class="user-profile-container">
        <div class="breadcrumb">
            <a href="/dashboard">Dashboard</a> / <span id="breadcrumbName">User Profile</span>
        </div>

        <div id="upLoading" class="up-loading">Loading profile...</div>
        <div id="upError" class="up-error">User not found.</div>

        <div id="upContent" class="hide">
            <section class="up-profile-section">
                <div class="up-header">
                    <div class="up-pic-wrapper">
                        <img id="upPic" src="/assets/images/NoPfp.jpg" alt="Profile Picture">
                    </div>
                    <div class="up-info">
                        <h2 id="upName">Loading...</h2>
                        <p class="up-username">@<span id="upUsername">loading</span></p>
                        <div class="up-joined" id="upJoined">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="16" y1="2" x2="16" y2="6"></line>
                                <line x1="8" y1="2" x2="8" y2="6"></line>
                                <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            <span>Joined <span id="upJoinedDate"></span></span>
                        </div>
                        <div class="up-details-grid">
                            <div class="up-detail-item"><strong>Student Type</strong> <span id="upType">—</span></div>
                            <div class="up-detail-item"><strong>Hostel</strong> <span id="upHostel">—</span></div>
                            <div class="up-detail-item"><strong>Year</strong> <span id="upYear">—</span></div>
                            <div class="up-detail-item"><strong>Course</strong> <span id="upCourse">—</span></div>
                        </div>
                        <div class="up-actions" id="upActions">
                            <!-- Chat button injected by JS (hidden if viewing own profile) -->
                        </div>
                    </div>
                </div>
            </section>

            <section class="up-products-section">
                <br>
                <h2 id="upProductsHeading">Products</h2>
                <div id="upProductGrid" class="up-product-grid">
                    <!-- Products loaded dynamically -->
                </div>
            </section>
        </div>
    </main>

    <footer>
        <a href="/support#about">About</a>
        <a href="/support#contact">Contact Us</a>
        <a href="/support#support">Support</a>
        <br><br>
        &copy; 2026 CampusMarketPlace. All Rights Reserved.
    </footer>
    <script src="/js/utils/theme.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="/js/utils/notifications.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/utils/socketClient.js"></script>
    <script src="/js/user-profile.js"></script>
</body>

</html>
